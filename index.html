<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unwrap you gift!</title>
    <meta name="description" content="Click to open the digital game and unwrap you gift! Peel away the endless layers to reveal your hidden surprise inside.">
    <meta name="keywords" content="Unwrap you gift!, unwrap your gift, birthday game, virtual gift">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <span style="display:none;">Unwrap you gift!</span>
    <div id="game-ui">
        <h1 style="text-align: center; color: #fff; font-family: sans-serif; margin-top: 20px;">Unwrap you gift!</h1>
        <div id="counter">Layers remaining: <span id="box-count">65</span></div>
        <div class="box-container" id="gift-box">
            <div class="box">
                <div class="ribbon-v"></div>
                <div class="ribbon-h"></div>
            </div>
        </div>
        <div id="message">Click the present to start unwrapping!</div>
    </div>
    <div id="final-gift" class="hidden">
        <h1>🎉 Happy Birthday! 🎉</h1>
        <p>You survived the endless nesting boxes!</p>
        <div class="reward-container">
            <p class="reward-label">YOUR REAL SURPRISE:</p>
            <h2 class="reward-text">✨ I love you mama! ✨</h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
