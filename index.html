<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unwrap Your Gift!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-ui" class="game-section">
        <div id="level-badge" class="level-badge">LEVEL 1</div>
        <div id="counter">Layers remaining: <span id="box-count">65</span></div>
        <div class="box-container" id="gift-box">
            <div class="box">
                <div class="ribbon-v"></div>
                <div class="ribbon-h"></div>
            </div>
        </div>
        <div id="message" class="message-box">Click the present to start unwrapping!</div>
    </div>

    <div id="final-gift" class="game-section hidden">
        <h1>🎉 Happy Birthday! 🎉</h1>
        <p>You beat all 5 levels and completed 1035 clicks! You are the ultimate champion!</p>
        <div class="reward-container">
            <p class="reward-label">YOUR REAL SURPRISE:</p>
            <h2 class="reward-text">✨ CONCERT TICKETS! ✨</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
